---
galaxy_info:
  role_name: system_docker
  namespace: mdd13
  author: Ivan Medaev
  company: Kitezh
  license: MIT
  min_ansible_version: "2.15"
  description: |
    Install and configure Docker Engine on Linux systems.

  # Supported platforms:
  platforms:
    - name: Ubuntu
      versions:
        - focal       # 20.04
        - jammy       # 22.04
        - noble       # 24.04
    - name: Debian
      versions:
        - bullseye    # 11
        - bookworm    # 12
        - trixie      # 13
    - name: EL
      versions:
        - "8"         # RHEL 8 / CentOS 8
        - "9"         # RHEL 9 / CentOS 9
        - "10"        # RHEL 10
    - name: AlmaLinux
      versions:
        - all
    - name: Rocky
      versions:
        - all
    - name: opensuse
      versions:
        - all
    - name: SLES
      versions:
        - all

  # Tags for Ansible Galaxy search:
  galaxy_tags:
    - docker
    - container
    - system

  # Issue tracker and repository:
  issue_tracker_url: https://github.com/exitfound/vip/issues

# Dependent roles will be executed before system-docker:
dependencies:
  - role: system-prepare
